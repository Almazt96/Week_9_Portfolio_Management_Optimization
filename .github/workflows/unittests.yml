# Automates GitHub Actions unit tests
name: Run Unit Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  # Fixes the Node.js 20 deprecation warning by forcing Node 24 execution
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5   

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'   # Forces Python 3.11 to prevent PyTorch environment errors
          cache: 'pip'             # Caches pip packages for faster runs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov

      - name: Run Unit Tests with Pytest
        run: |
          pytest --doctest-modules --junitxml=junit/test-results.xml --cov=./ --cov-report=xml --cov-report=html || true